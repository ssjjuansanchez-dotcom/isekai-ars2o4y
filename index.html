<!DOCTYPE html>
<html>
  <head>
    <!-- Esto arregla el tamaño para que se vea bien en celular sin activar modo PC -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JIS Isekai AR</title>
    
    <!-- Librerías de AR y Captura -->
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
      body { margin: 0; overflow: hidden; font-family: Arial, sans-serif; }
      /* Contenedor de botones flotantes abajo */
      .ui-container { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; z-index: 9999; }
      .btn-capture { background-color: #ffffff; color: #333333; border: none; padding: 15px 25px; font-size: 14px; font-weight: bold; border-radius: 50px; cursor: pointer; box-shadow: 0px 4px 10px rgba(0,0,0,0.3); }
      #btn-video { background-color: #ff4757; color: white; }
    </style>
  </head>
  <body style="margin: 0; overflow: hidden;">

    <!-- Botones en pantalla -->
    <div class="ui-container">
      <button id="btn-foto" class="btn-capture" onclick="capturarFoto()">📸 FOTO</button>
      <button id="btn-video" class="btn-capture" onclick="controlarVideo()">🎥 GRABAR</button>
    </div>

<!-- Escena AR con buffer preservado para que el 3D salga en las fotos -->
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; sourceWidth:1280; sourceHeight:720; displayWidth:1280; displayHeight:720;" renderer="preserveDrawingBuffer: true;">

<script>
      function capturarFoto() {
        // Ocultamos los botones para que no salgan en la foto
        document.querySelector('.ui-container').style.display = 'none';

        const scene = document.querySelector('a-scene');
        const video = document.querySelector('video');
        const canvas3D = scene.renderer.getContext().canvas;

        // Creamos un lienzo temporal para unir la cámara y el 3D
        const mergedCanvas = document.createElement('canvas');
        mergedCanvas.width = canvas3D.width;
        mergedCanvas.height = canvas3D.height;
        const ctx = mergedCanvas.getContext('2d');

        // 1. Dibujamos la cámara real de fondo
        if (video) {
          ctx.drawImage(video, 0, 0, mergedCanvas.width, mergedCanvas.height);
        }

        // 2. Dibujamos el personaje 3D encima
        ctx.drawImage(canvas3D, 0, 0);

        // 3. Descargamos la foto final corregida
        const link = document.createElement('a');
        link.download = 'JIS_Isekai_AR_' + Date.now() + '.png';
        link.href = mergedCanvas.toDataURL('image/png');
        link.click();

        // Volvemos a mostrar los botones
        document.querySelector('.ui-container').style.display = 'flex';
      }

      let mediaRecorder; let recordedChunks = []; let grabbing = false;
      function controlarVideo() {
        const btn = document.getElementById('btn-video');
        if (!grabbing) {
          recordedChunks = [];
          
          // Captura optimizada a 24 FPS para evitar tirones
          const stream = document.querySelector('canvas').captureStream(24); 
          
          let options = { mimeType: 'video/webm;codecs=vp8' };
          if (!MediaRecorder.isTypeSupported(options.mimeType)) {
            options = { mimeType: 'video/mp4' };
          }
          
          // Límite de bitrate para que el celular no se asfixie
          options.videoBitsPerSecond = 1500000; 

          mediaRecorder = new MediaRecorder(stream, options);
          mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
          mediaRecorder.onstop = () => {
            const blob = new Blob(recordedChunks, { type: mediaRecorder.mimeType }); 
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); 
            a.href = url; 
            a.download = 'JIS_Isekai_AR_' + Date.now() + (options.mimeType.includes('mp4') ? '.mp4' : '.webm'); 
            a.click();
          };
          
          mediaRecorder.start(100); // Graba en bloques chicos para que sea fluido
          grabbing = true; 
          btn.innerText = "🛑 PARAR"; 
          btn.style.backgroundColor = "#2ed573";
        } else { 
          mediaRecorder.stop(); 
          grabbing = false; 
          btn.innerText = "🎥 GRABAR"; 
          btn.style.backgroundColor = "#ff4757"; 
        }
      }
    </script>
  </body>
</html>
