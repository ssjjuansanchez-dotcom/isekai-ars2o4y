<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>JIS Isekai AR</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
      body { margin: 0; overflow: hidden; font-family: Arial, sans-serif; }
      .ui-container { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; z-index: 9999; }
      .btn-capture { background-color: #ffffff; color: #333333; border: none; padding: 15px 25px; font-size: 14px; font-weight: bold; border-radius: 50px; cursor: pointer; box-shadow: 0px 4px 10px rgba(0,0,0,0.3); }
      #btn-video { background-color: #ff4757; color: white; }
    </style>
  </head>
  <body>

    <div class="ui-container">
      <button id="btn-foto" class="btn-capture" onclick="capturarFoto()">📸 FOTO</button>
      <button id="btn-video" class="btn-capture" onclick="controlarVideo()">🎥 GRABAR</button>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
      
      <a-marker type="pattern" url="remera1.patt">
        <a-entity gltf-model="diseño1.glb.glb" scale="1 1 1" position="0 0 0" rotation="0 0 0"></a-entity>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>

    <script>
      function capturarFoto() {
        document.querySelector('.ui-container').style.display = 'none';
        html2canvas(document.body).then(canvas => {
          const link = document.createElement('a');
          link.download = 'JIS_Isekai_AR_' + Date.now() + '.png';
          link.href = canvas.toDataURL(); link.click();
          document.querySelector('.ui-container').style.display = 'flex';
        });
      }
      let mediaRecorder; let recordedChunks = []; let grabbing = false;
      function controlarVideo() {
        const btn = document.getElementById('btn-video');
        if (!grabbing) {
          recordedChunks = []; const stream = document.querySelector('canvas').captureStream(30);
          mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
          mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
          mediaRecorder.onstop = () => {
            const blob = new Blob(recordedChunks, { type: 'video/webm' }); const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = 'JIS_Isekai_AR_' + Date.now() + '.webm'; a.click();
          };
          mediaRecorder.start(); grabbing = true; btn.innerText = "🛑 PARAR"; btn.style.backgroundColor = "#2ed573";
        } else { mediaRecorder.stop(); grabbing = false; btn.innerText = "🎥 GRABAR"; btn.style.backgroundColor = "#ff4757"; }
      }
    </script>
  </body>
</html>
